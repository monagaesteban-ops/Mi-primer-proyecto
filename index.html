<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pronóstico del Tiempo</title>
    <link href="css/estilos.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <h1>Pronóstico del Tiempo</h1>
      <h2>¿Cómo se ve el cielo hoy?</h2>
      <input type="text" placeholder="Busca un lugar..." />
      <button>Buscar</button>
    </header>
    <main class="main">
      <section class="current-weather">
        <h3>Ciudad</h3>
        <p id="fecha"></p>
        <h1></h1>
        <p id="descripcion"></p>
        <img
          id="icono-clima"
          src="https://openweathermap.org/img/wn/01d@2x.png"
          alt="icono clima"
        />
        <div>
          <div class="stats-container">
            <div class="sen1" id="sensacion"></div>
            <div class="sen1" id="humedad"></div>
            <div class="sen1" id="viento"></div>
            <div class="sen1" id="prec"></div>
          </div>
        </div>

        <div class="daily-container">
          <h3>Pronóstico diario</h3>
          <div class="daily-forecast-container"></div>
        </div>
      </section>

      <div class="sen">
        <h3>Pronóstico por horas</h3>
        <div class="hourly-container"></div>
      </div>
    </main>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Cursive:wght@400..700&family=Iceland&display=swap");
    </style>
    <script src="js/app.js"></script>
    <script src="js/hora.js"></script>
    <script src="js/dia.js"></script>
  </body>
</html>
